<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vacuum Cleaner</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #fff;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  padding: 12px 20px;
  border-bottom: 1px solid #eee;
}

.top-btn {
  background: #111;
  color: white;
  padding: 10px 16px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

/* LAYOUT */
.container {
  max-width: 1100px;
  margin: auto;
  padding: 30px 20px;
  display: grid;
  grid-template-columns: 1.2fr 0.8fr;
  gap: 30px;
}

.media {
  width: 100%;
  height: 400px;
  background: black;
}

.thumbs {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.thumb {
  width: 70px;
  height: 70px;
  object-fit: cover;
  cursor: pointer;
}

/* PANEL */
.panel {
  border: 1px solid #eee;
  padding: 20px;
  border-radius: 10px;
}

.price {
  font-size: 32px;
  font-weight: bold;
}

.cta {
  width: 100%;
  padding: 14px;
  background: #111;
  color: white;
  border: none;
  margin-top: 10px;
  cursor: pointer;
}

#stockText {
  margin-top: 8px;
  font-weight: 600;
}
</style>
</head>

<body>

<header>
  <div>🔥 Limited Offer</div>
  <button onclick="handleBuy()" class="top-btn">Buy Now</button>
</header>

<div class="container">

  <!-- LEFT -->
  <div>
    <div class="media" id="mainMedia">
      <video width="100%" height="100%" controls>
        <source src="assets/product-video.mp4">
      </video>
    </div>

    <div class="thumbs">
      <img class="thumb" src="assets/image1.jpg" onclick="showImage('assets/image1.jpg')">
      <img class="thumb" src="assets/image2.jpg" onclick="showImage('assets/image2.jpg')">
      <img class="thumb" src="assets/image3.jpg" onclick="showImage('assets/image3.jpg')">
      <img class="thumb" src="assets/image4.jpg" onclick="showImage('assets/image4.jpg')">
    </div>
  </div>

  <!-- RIGHT -->
  <div class="panel">
    <h1>Premium Vacuum Cleaner</h1>

    <div class="price">24,99 €</div>

    <p id="stockText"></p>

    <button id="buyBtn" onclick="handleBuy()" class="cta">Buy Now</button>

    <p>✔ Secure payment<br>✔ Free delivery<br>✔ Tax included</p>
  </div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDBYtMrRsnfHS8QMz8UgMjVmrBJ92siSbU",
  authDomain: "vacuum-cleaner-e8857.firebaseapp.com",
  projectId: "vacuum-cleaner-e8857",
  storageBucket: "vacuum-cleaner-e8857.firebasestorage.app",
  messagingSenderId: "21864775088",
  appId: "1:21864775088:web:5d7b55dd9f6af7c7eaea75"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

<!-- BUY LOGIC -->
<script>
async function handleBuy() {
  const ref = db.collection("product").doc("vacuum");

  try {
    const doc = await ref.get();

    if (!doc.exists) {
      alert("Error");
      return;
    }

    let stock = doc.data().stock;

    if (stock <= 0) {
      alert("Sold Out");
      return;
    }

    await ref.update({ stock: stock - 1 });

    window.location.href = "https://buy.stripe.com/8x2bJ13E0ehYb5N6hxcIE00";

  } catch (e) {
    alert("ERROR: " + e.message);
  }
}
</script>

<!-- LIVE STOCK -->
<script>
const ref = db.collection("product").doc("vacuum");

ref.onSnapshot((doc) => {
  let stock = doc.data().stock;

  const stockText = document.getElementById("stockText");
  const btn = document.getElementById("buyBtn");

  if (stock > 0) {
    stockText.innerText = `🔥 Only ${stock} left`;
    btn.disabled = false;
    btn.innerText = "Buy Now";
    btn.style.opacity = "1";
  } else {
    stockText.innerText = "❌ Sold Out";
    btn.disabled = true;
    btn.innerText = "Sold Out";
    btn.style.opacity = "0.5";
  }
});
</script>

<!-- MEDIA SWITCH -->
<script>
function showImage(src) {
  document.getElementById("mainMedia").innerHTML =
    `<img src="${src}" style="width:100%;height:100%;object-fit:contain;">`;
}
</script>

</body>
</html>
