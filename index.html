<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>NOVARA</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#fff;
  color:#111;
  overflow-x:hidden;
}

/* HEADER */

header{
  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:16px 20px;

  border-bottom:1px solid #eee;
  background:#fff;

  position:sticky;
  top:0;
  z-index:100;

  overflow:hidden;
}

/* LOGO FIX */

.logo-wrap{
  width:160px;
  overflow:hidden;

  display:flex;
  align-items:center;
}

.logo{
  height:52px;
  width:auto;

  transform:scale(2.2);
  transform-origin:left center;

  object-fit:contain;
}

/* BUTTON */

.top-btn{
  background:#111;
  color:white;
  padding:12px 22px;
  border-radius:999px;
  border:none;
  cursor:pointer;
  font-size:15px;
  font-weight:500;
  transition:0.2s ease;
}

.top-btn:hover{
  opacity:0.92;
}

/* CONTAINER */

.container{
  max-width:1000px;
  margin:auto;
  padding:22px 20px 40px;
}

/* MEDIA */

.media{
  width:100%;
  height:420px;
  border-radius:22px;
  overflow:hidden;
  background:#000;
  position:relative;
}

.media img,
.media video{
  width:100%;
  height:100%;
  object-fit:contain;
}

/* PLAY */

.play{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:rgba(0,0,0,0.6);
  color:white;
  font-size:30px;
  padding:16px 20px;
  border-radius:50%;
}

/* THUMBS */

.thumbs{
  display:flex;
  gap:12px;
  margin-top:15px;

  overflow-x:auto;
  overflow-y:hidden;

  scroll-snap-type:x mandatory;

  padding-bottom:6px;

  -webkit-overflow-scrolling:touch;
}

.thumbs::-webkit-scrollbar{
  display:none;
}

.thumb{
  flex:0 0 auto;

  width:78px;
  height:78px;

  border-radius:14px;

  object-fit:cover;

  cursor:pointer;

  border:2px solid transparent;

  scroll-snap-align:start;

  transition:0.2s ease;
}

.thumb:hover{
  transform:scale(1.03);
}

.thumb.active{
  border-color:#111;
}

/* CONTENT */

.panel{
  margin-top:34px;
}

h1{
  font-size:42px;
  line-height:1.1;
  margin-bottom:16px;
}

.price{
  font-size:38px;
  font-weight:700;
  margin-bottom:8px;
}

#stockText{
  margin-top:6px;
  font-size:15px;
  color:#666;
  margin-bottom:18px;
}

/* CTA */

.cta{
  width:100%;
  padding:18px;
  border-radius:999px;
  border:none;
  background:#111;
  color:white;
  font-size:17px;
  font-weight:500;
  cursor:pointer;
  transition:0.2s ease;
}

.cta:hover{
  opacity:0.92;
}

/* INFO */

.info{
  margin-top:22px;
  line-height:1.9;
  color:#444;
  font-size:15px;
}

/* MOBILE */

@media(max-width:768px){

  header{
    padding:14px 16px;
  }

  .logo-wrap{
    width:135px;
  }

  .logo{
    height:44px;
    transform:scale(2.1);
  }

  .top-btn{
    padding:11px 18px;
    font-size:14px;
  }

  .container{
    padding:18px 14px 35px;
  }

  .media{
    height:330px;
    border-radius:20px;
  }

  h1{
    font-size:28px;
  }

  .price{
    font-size:30px;
  }

}

</style>
</head>

<body>

<!-- HEADER -->

<header>

  <div class="logo-wrap">
    <img src="assets/novara-header.png" class="logo">
  </div>

  <button id="buyBtnTop" class="top-btn">
    Buy Now
  </button>

</header>

<!-- PAGE -->

<div class="container">

  <!-- MEDIA -->

  <div class="media" id="mainMedia">

    <div
      onclick="showVideo(this)"
      style="
        width:100%;
        height:100%;
        position:relative;
        cursor:pointer;
      "
    >

      <video width="100%" height="100%" preload="metadata">

        <source
          src="assets/product-video.mp4"
          type="video/mp4"
        >

      </video>

      <div class="play">▶</div>

    </div>

  </div>

  <!-- THUMBNAILS -->

  <div class="thumbs">

    <img
      class="thumb active"
      src="assets/video-thumb.jpg"
      onclick="showVideo(this)"
    >

    <img
      class="thumb"
      src="assets/image1.jpg"
      onclick="showImage(this,'assets/image1.jpg')"
    >

    <img
      class="thumb"
      src="assets/image2.jpg"
      onclick="showImage(this,'assets/image2.jpg')"
    >

    <img
      class="thumb"
      src="assets/image3.jpg"
      onclick="showImage(this,'assets/image3.jpg')"
    >

    <img
      class="thumb"
      src="assets/image4.jpg"
      onclick="showImage(this,'assets/image4.jpg')"
    >

  </div>

  <!-- CONTENT -->

  <div class="panel">

    <h1>Premium Vacuum Cleaner</h1>

    <div class="price">24,99 €</div>

    <p id="stockText">Loading...</p>

    <button id="buyBtn" class="cta">
      Buy Now
    </button>

    <div class="info">
      ✔ Secure payment<br>
      ✔ Free delivery<br>
      ✔ Tax included
    </div>

  </div>

</div>

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDBYtMrRsnfHS8QMz8UgMjVmrBJ92siSbU",
  authDomain: "vacuum-cleaner-e8857.firebaseapp.com",
  projectId: "vacuum-cleaner-e8857"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

</script>

<!-- BUY -->

<script>

async function handleBuy(){

  try{

    const ref = db.collection("product").doc("vacuum");

    const doc = await ref.get();

    let stock = doc.data().stock;

    if(stock <= 0){
      return alert("Sold Out");
    }

    document.getElementById("buyBtn").innerText =
      "Processing...";

    document.getElementById("buyBtnTop").innerText =
      "Processing...";

    await ref.update({
      stock: stock - 1
    });

    window.location.href =
      "https://buy.stripe.com/8x2bJ13E0ehYb5N6hxcIE00";

  }catch(e){

    alert("Error");

  }

}

document.getElementById("buyBtn").onclick =
  handleBuy;

document.getElementById("buyBtnTop").onclick =
  handleBuy;

</script>

<!-- STOCK -->

<script>

db.collection("product")
.doc("vacuum")
.onSnapshot((doc)=>{

  let stock = doc.data().stock;

  document.getElementById("stockText").innerText =
    stock > 0
      ? `In stock: ${stock}`
      : `Out of stock`;

});

</script>

<!-- GALLERY -->

<script>

function setActive(el){

  document
    .querySelectorAll(".thumb")
    .forEach(t => t.classList.remove("active"));

  if(el){
    el.classList.add("active");
  }

}

function showImage(el, src){

  setActive(el);

  document.getElementById("mainMedia").innerHTML = `

    <img
      src="${src}"
      style="opacity:0"
      onload="this.style.opacity=1"
    >

  `;

}

function showVideo(el){

  setActive(el);

  document.getElementById("mainMedia").innerHTML = `

    <video
      width="100%"
      height="100%"
      controls
      autoplay
    >

      <source
        src="assets/product-video.mp4"
        type="video/mp4"
      >

    </video>

  `;

}

</script>

</body>
</html>
