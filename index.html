<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vacuum Cleaner</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

header {
  display: flex;
  justify-content: space-between;
  padding: 12px 20px;
  border-bottom: 1px solid #eee;
}

.top-btn {
  background: #111;
  color: white;
  padding: 10px 16px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.media {
  width: 100%;
  height: 400px;
  background: black;
}

.thumbs {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.thumb {
  width: 70px;
  height: 70px;
  object-fit: cover;
  cursor: pointer;
  border: 2px solid transparent;
}

.thumb:hover {
  border: 2px solid #111;
}

.panel {
  margin-top: 20px;
}

.price {
  font-size: 32px;
  font-weight: bold;
}

.cta {
  width: 100%;
  padding: 14px;
  background: #111;
  color: white;
  border: none;
  margin-top: 10px;
  cursor: pointer;
}

#stockText {
  margin-top: 8px;
  font-weight: 600;
  font-size: 14px;
}
</style>
</head>

<body>

<header>
  <div>🔥 Limited Offer</div>
  <button id="buyBtnTop" class="top-btn">Buy Now</button>
</header>

<div class="container">

  <!-- MAIN MEDIA -->
  <div class="media" id="mainMedia">
    <video width="100%" height="100%" controls>
      <source src="assets/product-video.mp4">
    </video>
  </div>

  <!-- THUMBNAILS -->
  <div class="thumbs">
    <img class="thumb" src="assets/image1.jpg" onclick="showImage('assets/image1.jpg')">
    <img class="thumb" src="assets/image2.jpg" onclick="showImage('assets/image2.jpg')">
    <img class="thumb" src="assets/image3.jpg" onclick="showImage('assets/image3.jpg')">
    <img class="thumb" src="assets/image4.jpg" onclick="showImage('assets/image4.jpg')">
    <img class="thumb" src="assets/video-thumb.jpg" onclick="showVideo()">
  </div>

  <!-- PRODUCT INFO -->
  <div class="panel">
    <h1>Premium Vacuum Cleaner</h1>

    <div class="price">24,99 €</div>

    <p id="stockText">Checking availability...</p>

    <button id="buyBtn" class="cta">Buy Now</button>

    <p>✔ Secure payment<br>✔ Free delivery<br>✔ Tax included</p>
  </div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDBYtMrRsnfHS8QMz8UgMjVmrBJ92siSbU",
  authDomain: "vacuum-cleaner-e8857.firebaseapp.com",
  projectId: "vacuum-cleaner-e8857"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

<!-- BUY FUNCTION -->
<script>
async function handleBuy() {
  try {
    const ref = db.collection("product").doc("vacuum");
    const doc = await ref.get();

    if (!doc.exists) return alert("Error");

    let stock = doc.data().stock;

    if (stock <= 0) {
      alert("Sold Out");
      return;
    }

    document.getElementById("buyBtn").innerText = "Processing...";
    document.getElementById("buyBtnTop").innerText = "Processing...";

    await ref.update({ stock: stock - 1 });

    window.location.href = "https://buy.stripe.com/8x2bJ13E0ehYb5N6hxcIE00";

  } catch (e) {
    alert("ERROR: " + e.message);
  }
}
</script>

<!-- CONNECT BUTTONS -->
<script>
document.getElementById("buyBtn").addEventListener("click", handleBuy);
document.getElementById("buyBtnTop").addEventListener("click", handleBuy);
</script>

<!-- LIVE STOCK -->
<script>
const ref = db.collection("product").doc("vacuum");

ref.onSnapshot((doc) => {
  let stock = doc.data().stock;

  const text = document.getElementById("stockText");

  if (stock > 0) {
    text.innerText = `In stock: ${stock}`;
  } else {
    text.innerText = `Out of stock`;
  }
});
</script>

<!-- MEDIA SWITCH -->
<script>
function showImage(src) {
  document.getElementById("mainMedia").innerHTML =
    `<img src="${src}" style="width:100%;height:100%;object-fit:contain;">`;
}

function showVideo() {
  document.getElementById("mainMedia").innerHTML =
    `<video width="100%" height="100%" controls autoplay>
      <source src="assets/product-video.mp4">
    </video>`;
}
</script>

</body>
</html>
