<style>

*{
  box-sizing:border-box;
}

html,
body{
  margin:0;
  padding:0;
  overflow-x:hidden;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#fff;
  color:#111;
}

/* HEADER */

header{
  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:14px 18px;

  border-bottom:1px solid #eee;

  background:rgba(255,255,255,0.92);

  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);

  position:sticky;
  top:0;
  z-index:100;

  width:100%;
}

/* LOGO */

.logo{
  height:30px;
  width:auto;

  display:block;
  object-fit:contain;

  flex-shrink:0;
}

/* BUTTON */

.top-btn{
  background:#111;
  color:#fff;

  padding:11px 20px;

  border-radius:999px;
  border:none;

  cursor:pointer;

  font-size:15px;
  font-weight:500;

  transition:0.2s ease;

  white-space:nowrap;

  flex-shrink:0;
}

.top-btn:hover{
  opacity:0.92;
}

/* CONTAINER */

.container{
  width:100%;
  max-width:1000px;

  margin:auto;

  padding:26px 16px 40px 16px;

  overflow:hidden;
}

/* MEDIA */

.media{
  width:100%;
  height:420px;

  border-radius:24px;

  overflow:hidden;

  background:#000;

  position:relative;
}

.media img,
.media video{
  width:100%;
  height:100%;

  object-fit:contain;

  display:block;
}

/* PLAY */

.play{
  position:absolute;

  top:50%;
  left:50%;

  transform:translate(-50%,-50%);

  background:rgba(0,0,0,0.55);

  color:#fff;

  font-size:28px;

  width:72px;
  height:72px;

  border-radius:50%;

  display:flex;
  align-items:center;
  justify-content:center;
}

/* THUMBS */

.thumbs{
  display:flex;

  gap:12px;

  margin-top:16px;

  overflow-x:auto;
  overflow-y:hidden;

  -webkit-overflow-scrolling:touch;

  scrollbar-width:none;

  width:100%;

  padding-bottom:4px;
}

.thumbs::-webkit-scrollbar{
  display:none;
}

.thumb{
  flex:0 0 auto;

  width:82px;
  height:82px;

  border-radius:16px;

  object-fit:cover;

  cursor:pointer;

  border:2px solid transparent;

  transition:0.2s ease;
}

.thumb.active{
  border-color:#111;
}

.thumb:hover{
  transform:scale(1.03);
}

/* CONTENT */

.panel{
  margin-top:34px;
}

h1{
  font-size:42px;
  line-height:1.1;
  margin-bottom:14px;
}

.price{
  font-size:42px;
  font-weight:700;

  margin-bottom:12px;
}

#stockText{
  margin-top:10px;

  font-size:16px;

  color:#555;
}

/* CTA */

.cta{
  width:100%;

  margin-top:18px;

  padding:18px;

  border:none;

  border-radius:999px;

  background:#111;
  color:#fff;

  font-size:17px;
  font-weight:600;

  cursor:pointer;

  transition:0.2s ease;
}

.cta:hover{
  opacity:0.94;
}

/* INFO */

.info{
  margin-top:22px;

  line-height:2;

  color:#444;

  font-size:15px;
}

/* MOBILE */

@media(max-width:768px){

  header{
    padding:12px 14px;
  }

  .logo{
    height:26px;
  }

  .top-btn{
    padding:10px 18px;
    font-size:14px;
  }

  .container{
    padding:22px 12px 40px 12px;
  }

  .media{
    height:300px;
    border-radius:22px;
  }

  .thumb{
    width:76px;
    height:76px;
  }

  h1{
    font-size:28px;
  }

  .price{
    font-size:30px;
  }

  .cta{
    padding:16px;
    font-size:16px;
  }

}

</style>
