<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>NOVARA</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#fff;
  color:#111;
}

/* 🌈 LUXURY HERO HEADER */

header{
  height:320px;
  display:flex;
  justify-content:center;
  align-items:center;
  position:sticky;
  top:0;
  z-index:100;
  overflow:hidden;

  /* Luxury gradient background */
  background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 35%, #2c2c2c 70%, #111 100%);
}

/* subtle glow overlay */
header::before{
  content:"";
  position:absolute;
  inset:0;
  background: radial-gradient(circle at center, rgba(255,255,255,0.08), transparent 60%);
  pointer-events:none;
}

/* LOGO WRAP */

.logo-wrap{
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
  z-index:2;
}

/* ✨ BIG LUXURY ANIMATED LOGO */

.logo{
  height:180px;
  width:auto;
  object-fit:contain;

  /* animation */
  animation: floatFade 3.5s ease-in-out infinite;
  filter: drop-shadow(0 10px 30px rgba(0,0,0,0.6));
}

/* floating animation */
@keyframes floatFade{
  0%{
    transform:translateY(0px) scale(1);
    opacity:0.85;
  }
  50%{
    transform:translateY(-10px) scale(1.03);
    opacity:1;
  }
  100%{
    transform:translateY(0px) scale(1);
    opacity:0.85;
  }
}

/* CONTAINER */

.container{
  max-width:1000px;
  margin:auto;
  padding:30px 20px;
}

/* MEDIA */

.media{
  width:100%;
  height:420px;
  border-radius:18px;
  overflow:hidden;
  background:#000;
  position:relative;
}

.media img,
.media video{
  width:100%;
  height:100%;
  object-fit:contain;
  transition:opacity 0.4s ease;
}

/* PLAY BUTTON */

.play{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:rgba(0,0,0,0.6);
  color:white;
  font-size:30px;
  padding:16px 20px;
  border-radius:50%;
}

/* THUMBS */

.thumbs{
  display:flex;
  gap:12px;
  margin-top:15px;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  padding-bottom:5px;
}

.thumbs::-webkit-scrollbar{
  display:none;
}

.thumb{
  flex:0 0 auto;
  width:75px;
  height:75px;
  border-radius:10px;
  object-fit:cover;
  cursor:pointer;
  border:2px solid transparent;
  scroll-snap-align:start;
  transition:0.2s ease;
}

.thumb:hover{
  transform:scale(1.03);
}

.thumb.active{
  border-color:#111;
}

/* CONTENT */

.panel{
  margin-top:30px;
}

h1{
  font-size:34px;
  margin-bottom:12px;
}

.price{
  font-size:34px;
  font-weight:600;
  margin-bottom:10px;
}

.cta{
  width:100%;
  padding:16px;
  border-radius:999px;
  border:none;
  background:#111;
  color:white;
  font-size:16px;
  cursor:pointer;
  margin-top:10px;
  transition:0.2s ease;
}

.cta:hover{
  opacity:0.92;
}

#stockText{
  margin-top:8px;
  font-size:14px;
  color:#555;
  margin-bottom:10px;
}

.info{
  margin-top:18px;
  line-height:1.8;
  color:#444;
}

/* MOBILE */

@media(max-width:768px){

  header{
    height:240px;
  }

  .logo{
    height:120px;
  }

  .media{
    height:320px;
  }

  h1{
    font-size:28px;
  }

  .price{
    font-size:28px;
  }

}
</style>
</head>

<body>

<!-- HERO HEADER -->

<header>
  <div class="logo-wrap">
    <img src="assets/novara-header.png" class="logo">
  </div>
</header>

<!-- PAGE -->

<div class="container">

  <!-- MEDIA -->

  <div class="media" id="mainMedia">

    <div 
      onclick="showVideo(this)" 
      style="
        width:100%;
        height:100%;
        position:relative;
        cursor:pointer;
      "
    >

      <video width="100%" height="100%" preload="metadata">
        <source src="assets/product-video.mp4" type="video/mp4">
      </video>

      <div class="play">▶</div>

    </div>

  </div>

  <!-- THUMBS -->

  <div class="thumbs">

    <img class="thumb active" src="assets/video-thumb.jpg" onclick="showVideo(this)">
    <img class="thumb" src="assets/image1.jpg" onclick="showImage(this,'assets/image1.jpg')">
    <img class="thumb" src="assets/image2.jpg" onclick="showImage(this,'assets/image2.jpg')">
    <img class="thumb" src="assets/image3.jpg" onclick="showImage(this,'assets/image3.jpg')">
    <img class="thumb" src="assets/image4.jpg" onclick="showImage(this,'assets/image4.jpg')">

  </div>

  <!-- CONTENT -->

  <div class="panel">

    <h1>Premium Vacuum Cleaner</h1>

    <div class="price">24,99 €</div>

    <p id="stockText">Loading...</p>

    <button id="buyBtn" class="cta">
      Buy Now
    </button>

    <div class="info">
      ✔ Secure payment<br>
      ✔ Free delivery<br>
      ✔ Tax included
    </div>

  </div>

</div>

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDBYtMrRsnfHS8QMz8UgMjVmrBJ92siSbU",
  authDomain: "vacuum-cleaner-e8857.firebaseapp.com",
  projectId: "vacuum-cleaner-e8857"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

<!-- BUY -->

<script>
async function handleBuy(){

  try{

    const ref = db.collection("product").doc("vacuum");
    const doc = await ref.get();

    let stock = doc.data().stock;

    if(stock <= 0){
      return alert("Sold Out");
    }

    document.getElementById("buyBtn").innerText = "Processing...";

    await ref.update({
      stock: stock - 1
    });

    window.location.href =
      "https://buy.stripe.com/8x2bJ13E0ehYb5N6hxcIE00";

  }catch(e){
    alert("Error");
  }

}

document.getElementById("buyBtn").onclick = handleBuy;
</script>

<!-- STOCK -->

<script>
db.collection("product")
.doc("vacuum")
.onSnapshot((doc)=>{

  let stock = doc.data().stock;

  document.getElementById("stockText").innerText =
    stock > 0
      ? `In stock: ${stock}`
      : `Out of stock`;

});
</script>

<!-- GALLERY -->

<script>
function setActive(el){
  document.querySelectorAll(".thumb").forEach(t => t.classList.remove("active"));
  if(el) el.classList.add("active");
}

function showImage(el, src){
  setActive(el);
  document.getElementById("mainMedia").innerHTML = `
    <img src="${src}" style="opacity:0" onload="this.style.opacity=1">
  `;
}

function showVideo(el){
  setActive(el);
  document.getElementById("mainMedia").innerHTML = `
    <video width="100%" height="100%" controls autoplay>
      <source src="assets/product-video.mp4" type="video/mp4">
    </video>
  `;
}
</script>

</body>
</html>
